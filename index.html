<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Lato:ital,wght@0,100;0,300;0,400;0,700;0,900;1,100;1,300;1,400;1,700;1,900&display=swap" rel="stylesheet">
</head>
<body>
    <div class="main_container">
        <div class="main_card">
            <header class="header">
                <h1 class="heading">My To-Do List!</h1>
            </header>
            <div class="add">
                <div class="add_tasks">
                    <input type="text" placeholder="Add Tasks" class="add_tasks_input"><button type="button" class="add_tasks_button">ADD</button>
                </div>
            </div>
            <div class="task_list">
                <ul class="list">
                    <li class="task"><span class="task_content">Cook Lunch</span> <span><button class="complete_task"><i class="fa-solid fa-check"></i></button> <button class="delete_task"><i class="fa-solid fa-trash-can"></i></button></span></li>
                    <li class="task"><span class="task_content">Study Maths</span> <span><button class="complete_task"><i class="fa-solid fa-check"></i></button> <button class="delete_task"><i class="fa-solid fa-trash-can"></i></button></span></li>
                    <li class="task"><span class="task_content">Gym</span> <span><button class="complete_task"><i class="fa-solid fa-check"></i></button> <button class="delete_task"><i class="fa-solid fa-trash-can"></i></button></span></li>
                    <li class="task"><span class="task_content">Buy Groceries</span> <span><button class="complete_task"><i class="fa-solid fa-check"></i></button> <button class="delete_task"><i class="fa-solid fa-trash-can"></i></button></span></li>
                </ul>
            </div>
        </div>
    </div>
    <footer>
        <div class="developer">
            <p class="developer-text">
                Developed by <span class="name">ARJU SRIVASTAV</span>
            </p>
            <div class="social-links">
                <a href="https://www.linkedin.com/in/arjusrivastav" target="_blank" aria-label="LinkedIn">
                    <i class="fa-brands fa-linkedin"></i>
                </a>
                <a href="https://github.com/GORTHAN2007" target="_blank" aria-label="GitHub">
                    <i class="fa-brands fa-github"></i>
                </a>
            </div>
        </div>
    </footer>
    <script src="script.js"></script>
</body>
</html>
