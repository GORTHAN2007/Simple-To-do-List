<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
    <div class="main_container">
        <div class="main_card">
            <header class="header">
                <h1 class="heading">My To-Do List! </h1>
            </header>
            <div class="add">
                <form action="#" class="add_tasks">
                    <input type="text" placeholder="Add Tasks" class="add_tasks_input">
                    <button type="submit">ADD</button>
                </form>
            </div>
            <div class="task_list">
                <ul class="list">
                    <li class="task">Cook Lunch <span><button><i class="fa-solid fa-check"></i></button> <button class="delete_task"><i class="fa-solid fa-trash-can"></i></button></span></li>
                    <li class="task">Study Maths <span><button><i class="fa-solid fa-check"></i></button> <button class="delete_task"><i class="fa-solid fa-trash-can"></i></button></span></li>
                    <li class="task">Gym <span><button><i class="fa-solid fa-check"></i></button> <button class="delete_task"><i class="fa-solid fa-trash-can"></i></button></span></li>
                    <li class="task">Buy Groceries <span><button><i class="fa-solid fa-check"></i></button> <button class="delete_task"><i class="fa-solid fa-trash-can"></i></button></span></li>
                </ul>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
